<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>KUS — Editor de Miniaturas</title>
<style>
:root{--bg:#0f0e0d;--surface:#161513;--border:rgba(255,255,255,0.08);--text:#d8d7d4;--muted:#787773;--primary:#4f98a3;--accent:#f5a623}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.editor-header{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.editor-title{font-weight:700;font-size:14px;color:var(--primary)}
.editor-body{display:flex;flex:1;overflow:hidden}
.editor-sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.editor-canvas-area{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.canvas-wrap{background:#222;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.5);overflow:hidden}
canvas{display:block}
.sidebar-section{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px}
.sidebar-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.ctrl-row{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.ctrl-row label{font-size:11px;color:var(--muted)}
.ctrl-row input[type=text],.ctrl-row input[type=range],.ctrl-row select,.ctrl-row input[type=color]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:11px;color:var(--text)}
.ctrl-row input[type=color]{height:32px;padding:2px}
.btn-export{width:100%;padding:10px;background:var(--primary);color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer}
.btn-upload{width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:11px;font-weight:600;color:var(--text);cursor:pointer}
</style>
</head>
<body>
<div class="editor-header">
  <div class="editor-title">🖼️ KUS — Editor de Miniaturas</div>
  <div style="font-size:11px;color:var(--muted)">⭐ Plan Influencer</div>
</div>
<div class="editor-body">
  <div class="editor-sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Imagen de fondo</div>
      <input type="file" id="bgUpload" accept="image/*" style="display:none">
      <button class="btn-upload" onclick="document.getElementById('bgUpload').click()">+ Subir imagen</button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Texto principal</div>
      <div class="ctrl-row"><label>Texto</label><input type="text" id="mainText" value="Tu título aquí" oninput="renderCanvas()"></div>
      <div class="ctrl-row"><label>Tamaño</label><input type="range" id="fontSize" min="20" max="120" value="64" oninput="renderCanvas()"></div>
      <div class="ctrl-row"><label>Color</label><input type="color" id="textColor" value="#ffffff" oninput="renderCanvas()"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Overlay</div>
      <div class="ctrl-row"><label>Color overlay</label><input type="color" id="overlayColor" value="#000000" oninput="renderCanvas()"></div>
      <div class="ctrl-row"><label>Opacidad</label><input type="range" id="overlayOpacity" min="0" max="100" value="40" oninput="renderCanvas()"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Exportar</div>
      <button class="btn-export" onclick="exportCanvas()">Descargar PNG (1280x720)</button>
    </div>
  </div>
  <div class="editor-canvas-area">
    <div class="canvas-wrap">
      <canvas id="thumbCanvas" width="1280" height="720" style="width:640px;height:360px"></canvas>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('thumbCanvas');
const ctx = canvas.getContext('2d');
let bgImage = null;

document.getElementById('bgUpload').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => { bgImage = img; renderCanvas(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function renderCanvas() {
  const text = document.getElementById('mainText').value;
  const fontSize = document.getElementById('fontSize').value;
  const textColor = document.getElementById('textColor').value;
  const overlayColor = document.getElementById('overlayColor').value;
  const overlayOpacity = document.getElementById('overlayOpacity').value / 100;

  ctx.clearRect(0, 0, 1280, 720);
  if (bgImage) {
    ctx.drawImage(bgImage, 0, 0, 1280, 720);
  } else {
    ctx.fillStyle = '#1c1b19';
    ctx.fillRect(0, 0, 1280, 720);
  }

  // Overlay
  ctx.fillStyle = overlayColor;
  ctx.globalAlpha = overlayOpacity;
  ctx.fillRect(0, 0, 1280, 720);
  ctx.globalAlpha = 1;

  // Text
  ctx.font = `bold ${fontSize}px -apple-system, Arial, sans-serif`;
  ctx.fillStyle = textColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 20;
  ctx.fillText(text, 640, 360);
  ctx.shadowBlur = 0;

  // KUS watermark
  ctx.font = 'bold 18px -apple-system, Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('KUS Creator Suite', 1264, 712);
}

function exportCanvas() {
  const link = document.createElement('a');
  link.download = `kus-thumbnail-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

renderCanvas();
</script>
</body>
</html>
